<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cờ Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            gap: 2px;
            background-color: #333;
            padding: 2px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: fit-content;
            margin: 0 auto;
        }
        .cell {
            width: 30px;
            height: 30px;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        @media (max-width: 600px) {
            .cell {
                width: 20px;
                height: 20px;
                font-size: 14px;
            }
        }
        .cell:hover {
            background-color: #f0f0f0;
        }
        .text-x {
            color: #ef4444; /* red-500 */
        }
        .text-o {
            color: #3b82f6; /* blue-500 */
        }
        .win-cell {
            background-color: #fef08a !important; /* yellow-200 */
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center py-10 font-sans text-white">
    <div class="container mx-auto px-4 flex flex-col items-center">
        <h1 class="text-4xl md:text-5xl font-extrabold mb-6 text-center shadow-sm">Cờ Caro</h1>

        <div class="bg-white/20 backdrop-blur-md rounded-xl p-6 shadow-xl w-full max-w-3xl flex flex-col items-center">
            <div class="flex justify-between items-center w-full mb-4 px-4">
                <div class="text-xl font-semibold">
                    <span>Lượt của: </span>
                    <span id="current-turn" class="text-x font-bold bg-white px-3 py-1 rounded-md shadow-sm">X</span>
                </div>
                <button id="reset-btn" class="bg-gradient-to-r from-pink-500 to-orange-400 hover:from-pink-600 hover:to-orange-500 text-white font-bold py-2 px-6 rounded-full shadow-lg transform transition hover:scale-105">
                    Chơi lại
                </button>
            </div>

            <div class="overflow-auto w-full flex justify-center pb-4">
                <div id="board" class="board"></div>
            </div>

            <div id="message" class="mt-4 text-2xl font-bold text-center h-8 text-yellow-300"></div>
        </div>
    </div>

    <script>
        const ROWS = 15;
        const COLS = 15;
        let board = [];
        let currentPlayer = 'X';
        let gameActive = true;
        const WIN_CONDITION = 5;

        const boardElement = document.getElementById('board');
        const currentTurnElement = document.getElementById('current-turn');
        const messageElement = document.getElementById('message');
        const resetBtn = document.getElementById('reset-btn');

        function initGame() {
            board = Array(ROWS).fill(null).map(() => Array(COLS).fill(''));
            currentPlayer = 'X';
            gameActive = true;
            messageElement.textContent = '';
            updateTurnDisplay();
            renderBoard();
        }

        function renderBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.addEventListener('click', handleCellClick);
                    boardElement.appendChild(cell);
                }
            }
        }

        function handleCellClick(e) {
            if (!gameActive) return;
            const r = parseInt(e.target.dataset.row);
            const c = parseInt(e.target.dataset.col);

            if (board[r][c] !== '') return;

            board[r][c] = currentPlayer;
            e.target.textContent = currentPlayer;
            e.target.classList.add(currentPlayer === 'X' ? 'text-x' : 'text-o');

            const winCells = checkWin(r, c, currentPlayer);
            if (winCells) {
                gameActive = false;
                highlightWin(winCells);
                messageElement.textContent = `Người chơi ${currentPlayer} giành chiến thắng! 🎉`;
                return;
            }

            if (checkDraw()) {
                gameActive = false;
                messageElement.textContent = 'Trò chơi hòa! 🤝';
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            updateTurnDisplay();
        }

        function updateTurnDisplay() {
            currentTurnElement.textContent = currentPlayer;
            currentTurnElement.className = `font-bold bg-white px-3 py-1 rounded-md shadow-sm ${currentPlayer === 'X' ? 'text-x' : 'text-o'}`;
        }

        function checkWin(r, c, player) {
            const directions = [
                [0, 1],  // Horizontal
                [1, 0],  // Vertical
                [1, 1],  // Diagonal \
                [1, -1]  // Diagonal /
            ];

            for (const [dr, dc] of directions) {
                let count = 1;
                let cells = [[r, c]];

                // Check positive direction
                let nr = r + dr;
                let nc = c + dc;
                while (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === player) {
                    count++;
                    cells.push([nr, nc]);
                    nr += dr;
                    nc += dc;
                }

                // Check negative direction
                nr = r - dr;
                nc = c - dc;
                while (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === player) {
                    count++;
                    cells.push([nr, nc]);
                    nr -= dr;
                    nc -= dc;
                }

                if (count >= WIN_CONDITION) {
                    return cells;
                }
            }
            return null;
        }

        function checkDraw() {
            return board.every(row => row.every(cell => cell !== ''));
        }

        function highlightWin(cells) {
            cells.forEach(([r, c]) => {
                const index = r * COLS + c;
                boardElement.children[index].classList.add('win-cell');
            });
        }

        resetBtn.addEventListener('click', initGame);

        // Initialize game on load
        initGame();
    </script>
</body>
</html>
