<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Tiếng Anh Cho Bé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
        }
        .btn-choice {
            transition: all 0.2s ease-in-out;
        }
        .btn-choice:active {
            transform: scale(0.95);
        }
        .bounce {
            animation: bounce 0.5s;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .shake {
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-300 via-purple-300 to-pink-300 flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-6 md:p-8 text-center border-4 border-white">

        <header class="mb-6">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-pink-500 mb-2 drop-shadow-sm">
                Bé Học Tiếng Anh! 🎈
            </h1>
            <div class="flex justify-between items-center bg-blue-50 rounded-full px-5 py-3 mt-4 shadow-inner border border-blue-100">
                <span class="font-bold text-blue-700 text-lg uppercase tracking-wide">Điểm số:</span>
                <span id="score-display" class="font-black text-3xl text-blue-600 drop-shadow-sm">0</span>
            </div>
        </header>

        <main id="game-screen" class="hidden">
            <div id="emoji-display" class="text-8xl md:text-9xl mb-4 drop-shadow-xl select-none">
                🍎
            </div>

            <div id="vietnamese-hint" class="text-lg text-gray-600 font-bold mb-6 bg-gray-100 inline-block px-4 py-1 rounded-full border border-gray-200 shadow-sm">
                <!-- Quả táo -->
            </div>

            <div id="options-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <!-- Buttons will be injected here -->
            </div>

            <div id="feedback-message" class="h-12 mt-6 flex items-center justify-center text-xl font-bold rounded-xl opacity-0 transition-opacity duration-300">
                <!-- Feedback message -->
            </div>
        </main>

        <main id="start-screen" class="flex flex-col items-center justify-center py-10">
            <div class="text-8xl mb-6 bounce drop-shadow-xl">🚀</div>
            <p class="text-xl text-gray-700 font-bold mb-8">Cùng nhau học từ vựng nhé!</p>
            <button onclick="startGame()" class="w-full py-4 bg-gradient-to-r from-green-400 to-emerald-500 text-white text-2xl font-bold rounded-2xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all border-b-4 border-emerald-600 active:border-b-0 active:translate-y-1">
                Bắt Đầu Ngay!
            </button>
        </main>

    </div>

    <script>
        const vocabulary = [
            { emoji: "🍎", word: "Apple", vi: "Quả táo" },
            { emoji: "🍌", word: "Banana", vi: "Quả chuối" },
            { emoji: "🐈", word: "Cat", vi: "Con mèo" },
            { emoji: "🐕", word: "Dog", vi: "Con chó" },
            { emoji: "🐘", word: "Elephant", vi: "Con voi" },
            { emoji: "🐸", word: "Frog", vi: "Con ếch" },
            { emoji: "🍇", word: "Grape", vi: "Quả nho" },
            { emoji: "🏠", word: "House", vi: "Ngôi nhà" },
            { emoji: "🍦", word: "Ice Cream", vi: "Cây kem" },
            { emoji: "🦁", word: "Lion", vi: "Con sư tử" },
            { emoji: "🐒", word: "Monkey", vi: "Con khỉ" },
            { emoji: "🍊", word: "Orange", vi: "Quả cam" },
            { emoji: "🐧", word: "Penguin", vi: "Chim cánh cụt" },
            { emoji: "☀️", word: "Sun", vi: "Mặt trời" },
            { emoji: "🌳", word: "Tree", vi: "Cái cây" },
            { emoji: "🍉", word: "Watermelon", vi: "Dưa hấu" },
            { emoji: "🚗", word: "Car", vi: "Ô tô" },
            { emoji: "✈️", word: "Airplane", vi: "Máy bay" },
            { emoji: "🐟", word: "Fish", vi: "Con cá" },
            { emoji: "🦋", word: "Butterfly", vi: "Con bướm" },
            { emoji: "🍓", word: "Strawberry", vi: "Quả dâu tây" },
            { emoji: "🍕", word: "Pizza", vi: "Bánh pizza" },
            { emoji: "⭐", word: "Star", vi: "Ngôi sao" },
            { emoji: "🌙", word: "Moon", vi: "Mặt trăng" }
        ];

        let score = 0;
        let currentWord = null;
        let isWaitingForNext = false;

        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const scoreDisplay = document.getElementById('score-display');
        const emojiDisplay = document.getElementById('emoji-display');
        const vietnameseHint = document.getElementById('vietnamese-hint');
        const optionsContainer = document.getElementById('options-container');
        const feedbackMessage = document.getElementById('feedback-message');

        function startGame() {
            score = 0;
            updateScore();
            startScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            nextQuestion();
        }

        function updateScore() {
            scoreDisplay.textContent = score;
            scoreDisplay.classList.add('bounce');
            setTimeout(() => scoreDisplay.classList.remove('bounce'), 500);
        }

        function nextQuestion() {
            isWaitingForNext = false;
            feedbackMessage.style.opacity = '0';
            optionsContainer.innerHTML = '';

            // Remove animation classes
            emojiDisplay.classList.remove('bounce', 'shake');

            // Pick correct answer
            const correctIndex = Math.floor(Math.random() * vocabulary.length);
            currentWord = vocabulary[correctIndex];

            // Pick 3 wrong answers
            let options = [currentWord];
            while (options.length < 4) {
                const wrongIndex = Math.floor(Math.random() * vocabulary.length);
                const wrongWord = vocabulary[wrongIndex];
                if (!options.find(opt => opt.word === wrongWord.word)) {
                    options.push(wrongWord);
                }
            }

            // Shuffle options
            options.sort(() => Math.random() - 0.5);

            // Render
            emojiDisplay.textContent = currentWord.emoji;
            emojiDisplay.classList.add('bounce');
            setTimeout(() => emojiDisplay.classList.remove('bounce'), 500);

            vietnameseHint.textContent = `Nghĩa là: "${currentWord.vi}"`;

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.textContent = opt.word;
                btn.className = 'btn-choice py-4 px-4 bg-white hover:bg-blue-50 text-gray-800 text-xl font-bold rounded-2xl border-2 border-gray-200 border-b-4 hover:border-blue-300 active:border-b-2 active:translate-y-[2px] shadow-sm';
                btn.onclick = () => checkAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedWord, btnElement) {
            if (isWaitingForNext) return;

            if (selectedWord.word === currentWord.word) {
                // Correct
                isWaitingForNext = true;
                score += 10;
                updateScore();

                // Style correct button
                btnElement.classList.remove('bg-white', 'hover:bg-blue-50', 'border-gray-200', 'hover:border-blue-300', 'text-gray-800');
                btnElement.classList.add('bg-green-400', 'border-green-600', 'text-white', 'border-b-4');

                feedbackMessage.textContent = "Chính xác! 🎉";
                feedbackMessage.className = "h-12 mt-6 flex items-center justify-center text-xl font-bold rounded-xl bg-green-100 text-green-700 opacity-100 transition-opacity duration-300 shadow-sm border border-green-200";

                emojiDisplay.classList.add('bounce');

                setTimeout(() => {
                    nextQuestion();
                }, 1500);
            } else {
                // Wrong
                btnElement.classList.remove('bg-white', 'hover:bg-blue-50', 'border-gray-200', 'hover:border-blue-300', 'text-gray-800');
                btnElement.classList.add('bg-red-400', 'border-red-600', 'text-white', 'shake', 'border-b-4');

                feedbackMessage.textContent = "Sai rồi, thử lại nhé! 😅";
                feedbackMessage.className = "h-12 mt-6 flex items-center justify-center text-xl font-bold rounded-xl bg-red-100 text-red-700 opacity-100 transition-opacity duration-300 shadow-sm border border-red-200";

                setTimeout(() => {
                    btnElement.classList.remove('shake');
                    // Reset button style
                    btnElement.classList.remove('bg-red-400', 'border-red-600', 'text-white');
                    btnElement.classList.add('bg-white', 'hover:bg-blue-50', 'border-gray-200', 'hover:border-blue-300', 'text-gray-800');
                    feedbackMessage.style.opacity = '0';
                }, 1000);
            }
        }
    </script>
</body>
</html>
