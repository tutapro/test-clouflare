<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Chấm Công</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'slide-up': 'slideUp 0.3s ease-out',
                        'fade-in': 'fadeIn 0.3s ease-out',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            touch-action: none; /* Prevent default pull-to-refresh and overall scrolling */
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            width: 100vw;
        }

        .scrollable {
            touch-action: pan-y;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.8);
            outline: none;
            border-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.2s;
        }

        .glass-btn:hover, .glass-btn:active {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0.98);
        }

        /* Custom scrollbar for scrollable area */
        .scrollable::-webkit-scrollbar {
            width: 6px;
        }
        .scrollable::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .scrollable::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 10px;
        }
    </style>
</head>
<body class="text-white font-sans flex flex-col items-center justify-center">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 w-11/12 max-w-sm pointer-events-none"></div>

    <!-- Main App Container -->
    <div class="glass w-11/12 max-w-md h-[95vh] rounded-3xl flex flex-col overflow-hidden relative shadow-2xl">

        <!-- Header -->
        <div class="px-6 py-5 border-b border-white/20 shrink-0">
            <h1 class="text-2xl font-bold text-center tracking-wide"><i class="fa-solid fa-clock mr-2"></i>Chấm Công</h1>
        </div>

        <!-- Content Area -->
        <div class="flex-1 overflow-hidden flex flex-col p-5 gap-5">

            <!-- Input Form -->
            <form id="time-form" class="flex flex-col gap-4 shrink-0 animate-fade-in">
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1">
                        <label for="date" class="text-sm font-medium opacity-90 text-shadow-sm">Ngày</label>
                        <input type="date" id="date" required class="glass-input text-gray-800 rounded-xl px-3 py-2 text-sm w-full font-medium transition-all" />
                    </div>
                    <div class="flex flex-col gap-1">
                        <label for="note" class="text-sm font-medium opacity-90 text-shadow-sm">Ghi chú (Tuỳ chọn)</label>
                        <input type="text" id="note" placeholder="Vd: Tăng ca..." class="glass-input text-gray-800 rounded-xl px-3 py-2 text-sm w-full transition-all" />
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1">
                        <label for="timeIn" class="text-sm font-medium opacity-90 text-shadow-sm">Giờ vào</label>
                        <input type="time" id="timeIn" required class="glass-input text-gray-800 rounded-xl px-3 py-2 text-lg w-full font-semibold transition-all text-center" />
                    </div>
                    <div class="flex flex-col gap-1">
                        <label for="timeOut" class="text-sm font-medium opacity-90 text-shadow-sm">Giờ ra</label>
                        <input type="time" id="timeOut" required class="glass-input text-gray-800 rounded-xl px-3 py-2 text-lg w-full font-semibold transition-all text-center" />
                    </div>
                </div>

                <button type="submit" class="glass-btn font-semibold text-white py-3 rounded-xl mt-1 shadow-md flex items-center justify-center gap-2 text-lg">
                    <i class="fa-solid fa-floppy-disk"></i> Lưu Thời Gian
                </button>
            </form>

            <div class="h-px bg-white/20 w-full shrink-0"></div>

            <!-- Stats & History -->
            <div class="flex flex-col flex-1 overflow-hidden min-h-0">
                <div class="flex justify-between items-center mb-3 shrink-0">
                    <h2 class="font-semibold text-lg"><i class="fa-solid fa-list-ul mr-2"></i>Lịch sử</h2>
                    <div class="text-sm font-medium bg-white/20 px-3 py-1 rounded-full border border-white/30">
                        Tổng: <span id="total-hours" class="font-bold">0</span>h
                    </div>
                </div>

                <div id="history-list" class="scrollable flex-1 flex flex-col gap-3 pb-4">
                    <!-- History items will be inserted here by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="glass w-10/12 max-w-sm rounded-2xl p-6 flex flex-col items-center text-center transform scale-95 transition-transform duration-300" id="confirm-modal-content">
            <div class="text-red-400 text-5xl mb-4">
                <i class="fa-solid fa-circle-exclamation"></i>
            </div>
            <h3 class="text-xl font-bold mb-2">Xác nhận xoá</h3>
            <p class="text-sm text-gray-100 mb-6">Bạn có chắc chắn muốn xoá bản ghi chấm công này không?</p>
            <div class="flex gap-3 w-full">
                <button id="cancel-btn" class="flex-1 glass-btn py-2 rounded-xl font-medium">Hủy</button>
                <button id="confirm-btn" class="flex-1 bg-red-500/80 hover:bg-red-500 text-white py-2 rounded-xl border border-red-400 font-medium transition-all">Xoá</button>
            </div>
        </div>
    </div>

    <script>
        // Prevent default touch behavior to stop pull-to-refresh and bounce effects,
        // but allow scrolling on elements with the 'scrollable' class.
        document.addEventListener('touchmove', function(event) {
            let target = event.target;
            let isScrollable = false;

            while (target && target !== document.body) {
                if (target.classList && target.classList.contains('scrollable')) {
                    // Check if it actually needs scrolling
                    if (target.scrollHeight > target.clientHeight) {
                        isScrollable = true;
                    }
                    break;
                }
                target = target.parentNode;
            }

            if (!isScrollable) {
                event.preventDefault();
            }
        }, { passive: false });

        // App State
        let records = [];
        let recordToDeleteId = null;

        // DOM Elements
        const form = document.getElementById('time-form');
        const dateInput = document.getElementById('date');
        const timeInInput = document.getElementById('timeIn');
        const timeOutInput = document.getElementById('timeOut');
        const noteInput = document.getElementById('note');
        const historyList = document.getElementById('history-list');
        const totalHoursEl = document.getElementById('total-hours');

        // Modal Elements
        const modal = document.getElementById('confirm-modal');
        const modalContent = document.getElementById('confirm-modal-content');
        const cancelBtn = document.getElementById('cancel-btn');
        const confirmBtn = document.getElementById('confirm-btn');

        // Initialization
        function init() {
            // Set default date to today
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            dateInput.value = `${year}-${month}-${day}`;

            // Load data from localStorage
            loadData();
            renderHistory();
        }

        // Calculate hours difference
        function calculateHours(timeIn, timeOut) {
            const [inHours, inMins] = timeIn.split(':').map(Number);
            const [outHours, outMins] = timeOut.split(':').map(Number);

            let inTotalMins = inHours * 60 + inMins;
            let outTotalMins = outHours * 60 + outMins;

            // Handle cross-midnight (giả sử ca làm việc qua đêm)
            if (outTotalMins <= inTotalMins) {
                outTotalMins += 24 * 60;
            }

            const diffMins = outTotalMins - inTotalMins;
            return diffMins / 60;
        }

        // Format number to 2 decimal places max
        function formatHours(hours) {
            return Number.isInteger(hours) ? hours.toString() : hours.toFixed(2);
        }

        // Format Date to DD/MM/YYYY
        function formatDate(dateString) {
            const [year, month, day] = dateString.split('-');
            return `${day}/${month}/${year}`;
        }

        // Show Toast Notification
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');

            const icon = type === 'success' ? '<i class="fa-solid fa-check-circle text-green-500"></i>' : '<i class="fa-solid fa-circle-xmark text-red-500"></i>';
            const bgColor = type === 'success' ? 'bg-white/90 border-green-400' : 'bg-white/90 border-red-400';

            toast.className = `flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg border text-gray-800 text-sm font-medium animate-slide-up pointer-events-auto ${bgColor} backdrop-blur-md transition-all duration-300`;
            toast.innerHTML = `${icon} <span>${message}</span>`;

            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Form Submit Handler
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const date = dateInput.value;
            const timeIn = timeInInput.value;
            const timeOut = timeOutInput.value;
            const note = noteInput.value.trim();

            if (!date || !timeIn || !timeOut) {
                showToast('Vui lòng điền đầy đủ thông tin!', 'error');
                return;
            }

            const hours = calculateHours(timeIn, timeOut);

            if (hours > 24) {
                 showToast('Thời gian làm việc không hợp lệ!', 'error');
                 return;
            }

            const newRecord = {
                id: Date.now().toString(),
                date,
                timeIn,
                timeOut,
                hours,
                note
            };

            records.push(newRecord);
            saveData();
            renderHistory();
            showToast('Đã lưu thành công!');

            // Reset times but keep date
            timeInInput.value = '';
            timeOutInput.value = '';
            noteInput.value = '';
        });

        // Delete handlers
        function askDelete(id) {
            recordToDeleteId = id;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            // small delay for transition
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            });
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                recordToDeleteId = null;
            }, 300);
        }

        cancelBtn.addEventListener('click', closeModal);

        confirmBtn.addEventListener('click', () => {
            if (recordToDeleteId) {
                records = records.filter(r => r.id !== recordToDeleteId);
                saveData();
                renderHistory();
                showToast('Đã xoá bản ghi!');
                closeModal();
            }
        });

        // Load & Save
        function saveData() {
            localStorage.setItem('chamCongRecords', JSON.stringify(records));
        }

        function loadData() {
            const data = localStorage.getItem('chamCongRecords');
            if (data) {
                try {
                    records = JSON.parse(data);
                } catch (e) {
                    records = [];
                }
            }
        }

        // Render History
        function renderHistory() {
            historyList.innerHTML = '';

            if (records.length === 0) {
                historyList.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-32 opacity-50 text-sm">
                        <i class="fa-solid fa-folder-open text-3xl mb-2"></i>
                        <p>Chưa có dữ liệu chấm công</p>
                    </div>
                `;
                totalHoursEl.textContent = '0';
                return;
            }

            // Sort by date (newest first)
            const sortedRecords = [...records].sort((a, b) => {
                if(a.date !== b.date) return new Date(b.date) - new Date(a.date);
                return b.timeIn.localeCompare(a.timeIn);
            });

            let totalH = 0;

            sortedRecords.forEach((record, index) => {
                totalH += record.hours;

                const item = document.createElement('div');
                item.className = 'bg-white/20 border border-white/30 rounded-xl p-3 flex items-center justify-between shadow-sm animate-slide-up backdrop-blur-sm';
                item.style.animationDelay = `${index * 0.05}s`;

                let noteHtml = record.note ? `<div class="text-xs text-indigo-100 mt-1 italic opacity-90"><i class="fa-solid fa-pen-clip mr-1 text-[10px]"></i>${record.note}</div>` : '';

                item.innerHTML = `
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="font-bold text-sm bg-black/20 px-2 py-0.5 rounded text-white">${formatDate(record.date)}</span>
                            <span class="text-xs font-semibold bg-green-500/80 px-2 py-0.5 rounded shadow-sm">
                                +${formatHours(record.hours)}h
                            </span>
                        </div>
                        <div class="text-sm font-medium flex items-center gap-2">
                            <span class="text-indigo-100"><i class="fa-solid fa-arrow-right-to-bracket mr-1"></i>${record.timeIn}</span>
                            <span class="text-white/50 text-xs"><i class="fa-solid fa-arrow-right"></i></span>
                            <span class="text-pink-100"><i class="fa-solid fa-arrow-right-from-bracket mr-1"></i>${record.timeOut}</span>
                        </div>
                        ${noteHtml}
                    </div>
                    <button onclick="askDelete('${record.id}')" class="w-10 h-10 rounded-full flex items-center justify-center text-red-200 hover:text-red-400 hover:bg-red-500/20 transition-colors ml-2 shrink-0">
                        <i class="fa-solid fa-trash-can text-lg"></i>
                    </button>
                `;

                historyList.appendChild(item);
            });

            totalHoursEl.textContent = formatHours(totalH);
        }

        // Start App
        init();
    </script>
</body>
</html>
