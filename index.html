<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikachu Connect</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #f0f0f0;
            overflow-x: hidden;
        }
        .game-container {
            max-width: 900px;
            margin: 40px auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        .grid-container {
            display: grid;
            gap: 5px;
            margin: 40px auto;
            position: relative;
            background: #e0e0e0;
            padding: 5px;
            border-radius: 8px;
        }
        .card {
            background-color: #fff;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.1s;
            width: 100%;
            aspect-ratio: 1;
        }
        .card:hover:not(.empty) {
            transform: scale(1.05);
        }
        .card.empty {
            background-color: transparent;
            box-shadow: none;
            cursor: default;
        }
        .card.selected {
            outline: 3px solid #ff69b4;
            transform: scale(1.05);
        }

        .line-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            overflow: visible;
        }

        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        .confetti span {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confetti-fall linear forwards;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1 class="text-3xl text-center mb-4">Pikachu Connect</h1>

        <div class="flex justify-center mb-4">
            <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded" id="new-game-button">New Game</button>
        </div>

        <div class="relative w-fit mx-auto mt-8">
            <div class="grid-container" id="grid-container"></div>
            <svg class="line-container" id="line-container"></svg>
        </div>
    </div>

    <script>
        const gridContainer = document.getElementById('grid-container');
        const newGameButton = document.getElementById('new-game-button');
        const lineContainer = document.getElementById('line-container');

        const tiles = ['🐰', '🐶', '🐱', '🐔', '🐷', '🐴', '🐲', '🐸', '🐺', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐵'];
        const gridRows = 6;
        const gridCols = 10;

        let board = [];
        let selectedTile = null;
        let pairsRemaining = 0;

        function initGame() {
            gridContainer.style.gridTemplateColumns = `repeat(${gridCols}, 60px)`;
            gridContainer.style.gridTemplateRows = `repeat(${gridRows}, 60px)`;

            const numPairs = (gridRows * gridCols) / 2;
            pairsRemaining = numPairs;
            let tilePool = [];
            for (let i = 0; i < numPairs; i++) {
                const tile = tiles[i % tiles.length];
                tilePool.push(tile, tile);
            }

            for (let i = tilePool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [tilePool[i], tilePool[j]] = [tilePool[j], tilePool[i]];
            }

            board = [];
            gridContainer.innerHTML = '';
            lineContainer.innerHTML = '';
            selectedTile = null;

            for (let r = 0; r < gridRows; r++) {
                let row = [];
                for (let c = 0; c < gridCols; c++) {
                    const value = tilePool.pop();
                    row.push(value);

                    const cell = document.createElement('div');
                    cell.classList.add('card');
                    cell.textContent = value;
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    cell.addEventListener('click', () => handleTileClick(r, c));
                    gridContainer.appendChild(cell);
                }
                board.push(row);
            }
        }

        function getCellElement(r, c) {
            return gridContainer.children[r * gridCols + c];
        }

        function getEmptyCell(board, r, c) {
            if (r < 0 || r >= board.length || c < 0 || c >= board[0].length) return true;
            return board[r][c] === 0;
        }

        function checkLineR(board, c, r1, r2) {
            const min = Math.min(r1, r2);
            const max = Math.max(r1, r2);
            for (let r = min + 1; r < max; r++) {
                if (!getEmptyCell(board, r, c)) return false;
            }
            return true;
        }

        function checkLineC(board, r, c1, c2) {
            const min = Math.min(c1, c2);
            const max = Math.max(c1, c2);
            for (let c = min + 1; c < max; c++) {
                if (!getEmptyCell(board, r, c)) return false;
            }
            return true;
        }

        function findPath(board, r1, c1, r2, c2) {
            if (board[r1][c1] !== board[r2][c2] || board[r1][c1] === 0) return null;
            if (r1 === r2 && c1 === c2) return null;

            const rows = board.length;
            const cols = board[0].length;

            if (r1 === r2 && checkLineC(board, r1, c1, c2)) return [{r: r1, c: c1}, {r: r2, c: c2}];
            if (c1 === c2 && checkLineR(board, c1, r1, r2)) return [{r: r1, c: c1}, {r: r2, c: c2}];

            if (getEmptyCell(board, r1, c2) && checkLineC(board, r1, c1, c2) && checkLineR(board, c2, r1, r2)) {
                return [{r: r1, c: c1}, {r: r1, c: c2}, {r: r2, c: c2}];
            }
            if (getEmptyCell(board, r2, c1) && checkLineR(board, c1, r1, r2) && checkLineC(board, r2, c1, c2)) {
                return [{r: r1, c: c1}, {r: r2, c: c1}, {r: r2, c: c2}];
            }

            for (let r = -1; r <= rows; r++) {
                if (checkLineR(board, c1, r1, r) && (r === r1 || getEmptyCell(board, r, c1))) {
                    if (checkLineR(board, c2, r2, r) && (r === r2 || getEmptyCell(board, r, c2))) {
                        if (checkLineC(board, r, c1, c2) && getEmptyCell(board, r, c1) && getEmptyCell(board, r, c2)) {
                            return [{r: r1, c: c1}, {r: r, c: c1}, {r: r, c: c2}, {r: r2, c: c2}];
                        }
                    }
                }
            }

            for (let c = -1; c <= cols; c++) {
                if (checkLineC(board, r1, c1, c) && (c === c1 || getEmptyCell(board, r1, c))) {
                    if (checkLineC(board, r2, c2, c) && (c === c2 || getEmptyCell(board, r2, c))) {
                        if (checkLineR(board, c, r1, r2) && getEmptyCell(board, r1, c) && getEmptyCell(board, r2, c)) {
                            return [{r: r1, c: c1}, {r: r1, c: c}, {r: r2, c: c}, {r: r2, c: c2}];
                        }
                    }
                }
            }

            return null;
        }

        function drawLine(path) {
            lineContainer.innerHTML = '';
            if (!path || path.length < 2) return;

            let svgHtml = '';
            for (let i = 0; i < path.length - 1; i++) {
                const p1 = path[i];
                const p2 = path[i+1];

                const x1 = 35 + p1.c * 65;
                const y1 = 35 + p1.r * 65;
                const x2 = 35 + p2.c * 65;
                const y2 = 35 + p2.r * 65;

                svgHtml += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#ff69b4" stroke-width="4" stroke-linecap="round"/>`;
            }

            lineContainer.innerHTML = svgHtml;

            setTimeout(() => {
                lineContainer.innerHTML = '';
            }, 300);
        }

        function handleTileClick(r, c) {
            if (board[r][c] === 0) return;

            const el = getCellElement(r, c);

            if (!selectedTile) {
                selectedTile = {r, c, el};
                el.classList.add('selected');
            } else {
                if (selectedTile.r === r && selectedTile.c === c) {
                    el.classList.remove('selected');
                    selectedTile = null;
                    return;
                }

                const path = findPath(board, selectedTile.r, selectedTile.c, r, c);

                if (path) {
                    drawLine(path);

                    const el1 = selectedTile.el;
                    const el2 = el;

                    el1.classList.remove('selected');
                    el1.classList.add('empty');
                    el1.textContent = '';

                    el2.classList.add('empty');
                    el2.textContent = '';

                    board[selectedTile.r][selectedTile.c] = 0;
                    board[r][c] = 0;

                    pairsRemaining--;
                    if (pairsRemaining === 0) {
                        setTimeout(showConfetti, 500);
                    }
                } else {
                    selectedTile.el.classList.remove('selected');
                }

                selectedTile = null;
            }
        }

        function showConfetti() {
            const confettiContainer = document.createElement('div');
            confettiContainer.classList.add('confetti');
            document.body.appendChild(confettiContainer);
            const colors = ['#ff69b4', '#33cc33', '#6666ff', '#ffff66', '#ff9933'];

            for (let i = 0; i < 150; i++) {
                const confetti = document.createElement('span');
                confetti.style.left = `${Math.random() * 100}%`;
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = `${Math.random() * 3 + 2}s`;
                confetti.style.animationDelay = `${Math.random() * 0.5}s`;
                if (Math.random() > 0.5) {
                    confetti.style.borderRadius = '50%';
                }
                confettiContainer.appendChild(confetti);
            }
            setTimeout(() => {
                confettiContainer.remove();
            }, 6000);
        }

        newGameButton.addEventListener('click', initGame);

        initGame();
    </script>
</body>
</html>
