<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Rắn Săn Mồi</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <script src="https://kit.fontawesome.com/your-font-awesome-key.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
        }
        .game-container {
            width: 800px;
            height: 600px;
            margin: 40px auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            background-color: #f7f7f7;
            padding: 20px;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(10, 40px);
            grid-template-rows: repeat(15, 40px);
            gap: 5px;
        }
        .snake {
            background-color: #008000;
            border-radius: 10px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: #fff;
        }
        .prey {
            background-color: #ff0000;
            border-radius: 10px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h2 class="text-center text-2xl mb-4">Game Rắn Săn Mồi</h2>
        <div class="game-board" id="game-board">
            <!-- Tạo các ô game -->
            <?php for ($i = 0; $i < 15; $i++) : ?>
                <?php for ($j = 0; $j < 10; $j++) : ?>
                    <div class="snake" id="snake-<?php echo $i . '-' . $j; ?>"></div>
                <?php endfor; ?>
            <?php endfor; ?>
            <?php for ($i = 0; $i < 15; $i++) : ?>
                <?php for ($j = 0; $j < 10; $j++) : ?>
                    <div class="prey" id="prey-<?php echo $i . '-' . $j; ?>"></div>
                <?php endfor; ?>
            <?php endfor; ?>
        </div>
        <button class="btn btn-primary" id="start-button">Bắt đầu</button>
        <button class="btn btn-secondary" id="reset-button">Reset</button>
    </div>

    <script>
        const gameBoard = document.getElementById('game-board');
        const startButton = document.getElementById('start-button');
        const resetButton = document.getElementById('reset-button');
        let snakePosition = [];
        let preyPosition = [];
        let direction = 'right';
        let score = 0;

        // Tạo vị trí rắn và thức ăn
        for (let i = 0; i < 10; i++) {
            for (let j = 0; j < 15; j++) {
                const snakeElement = document.getElementById(`snake-${i}-${j}`);
                snakeElement.style.top = `${j * 40}px`;
                snakeElement.style.left = `${i * 40}px`;
                snakePosition.push([i, j]);
            }
        }
        for (let i = 0; i < 10; i++) {
            for (let j = 0; j < 15; j++) {
                const preyElement = document.getElementById(`prey-${i}-${j}`);
                preyElement.style.top = `${j * 40}px`;
                preyElement.style.left = `${i * 40}px`;
                preyPosition.push([i, j]);
            }
        }

        // Sự kiện bắt đầu game
        startButton.addEventListener('click', () => {
            startGame();
        });

        // Sự kiện reset game
        resetButton.addEventListener('click', () => {
            resetGame();
        });

        // Tạo sự kiện click cho từng ô game
        gameBoard.addEventListener('click', (e) => {
            const targetElement = e.target;
            if (targetElement.classList.contains('snake')) {
                const snakeIndex = snakePosition.indexOf(snakePosition.find((position) => position[0] === parseInt(targetElement.id.split('-')[1]) && position[1] === parseInt(targetElement.id.split('-')[2])));
                if (snakeIndex !== -1) {
                    const preyIndex = preyPosition.indexOf(preyPosition.find((position) => position[0] === parseInt(targetElement.id.split('-')[1]) && position[1] === parseInt(targetElement.id.split('-')[2])));
                    if (preyIndex !== -1) {
                        score++;
                        const preyElement = document.getElementById(`prey-${targetElement.id.split('-')[1]}-${targetElement.id.split('-')[2]}`);
                        preyElement.style.display = 'none';
                        preyPosition.splice(preyIndex, 1);
                        snakePosition.push([parseInt(targetElement.id.split('-')[1]), parseInt(targetElement.id.split('-')[2])]);
                        updateSnakePosition();
                    }
                }
            }
        });

        // Tạo sự kiện di chuyển rắn
        setInterval(() => {
            const snakeHead = snakePosition[snakePosition.length - 1];
            let newSnakeHead = [snakeHead[0] + (direction === 'right' ? 1 : 0) + (direction === 'left' ? -1 : 0), snakeHead[1] + (direction === 'down' ? 1 : 0) + (direction === 'up' ? -1 : 0)];
            if (snakePosition.includes(newSnakeHead)) {
                resetGame();
            } else if (preyPosition.includes(newSnakeHead)) {
                const preyIndex = preyPosition.indexOf(newSnakeHead);
                const preyElement = document.getElementById(`prey-${newSnakeHead[0]}-${newSnakeHead[1]}`);
                preyElement.style.display = 'none';
                preyPosition.splice(preyIndex, 1);
                snakePosition.push(newSnakeHead);
                updateSnakePosition();
                score++;
            } else {
                snakePosition.push(newSnakeHead);
                updateSnakePosition();
            }
        }, 1000);

        // Cập nhật vị trí rắn
        function updateSnakePosition() {
            snakePosition.forEach((position, index) => {
                const snakeElement = document.getElementById(`snake-${position[0]}-${position[1]}`);
                snakeElement.style.top = `${position[1] * 40}px`;
                snakeElement.style.left = `${position[0] * 40}px`;
            });
        }

        // Bắt đầu game
        function startGame() {
            startButton.style.display = 'none';
            resetButton.style.display = 'none';
            snakePosition = [];
            preyPosition = [];
            score = 0;
            updateSnakePosition();
        }

        // Reset game
        function resetGame() {
            startButton.style.display = 'block';
            resetButton.style.display = 'block';
            snakePosition = [];
            preyPosition = [];
            score = 0;
            updateSnakePosition();
            for (let i = 0; i < 10; i++) {
                for (let j = 0; j < 15; j++) {
                    const preyElement = document.getElementById(`prey-${i}-${j}`);
                    preyElement.style.display = 'block';
                }
            }
        }
    </script>
</body>
</html>
