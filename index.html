<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikachu Connect</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .card {
            border-radius: 10px;
            transition: transform 0.2s ease-in-out;
            cursor: pointer;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .active {
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        .grid-item {
            padding: 20px;
            background-color: #f7f7f7;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f7f7f7;
            display: none;
        }
    </style>
</head>
<body>
    <div id="toast" class="hidden fixed top-5 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-4 py-2 rounded shadow-lg z-50 transition-opacity duration-300 opacity-0">Thắng!</div>
    <div class="confetti"></div>
    <div class="grid h-screen w-screen place-items-center">
        <div class="grid w-1/2">
            <div class="grid grid-cols-3 gap-4">
                <div class="grid-item" id="card-1">
                    <div class="card" id="card-1" onclick="selectCard(this)">
                        <i class="fas fa-pikachu text-3xl text-blue-500"></i>
                    </div>
                </div>
                <div class="grid-item" id="card-2">
                    <div class="card" id="card-2" onclick="selectCard(this)">
                        <i class="fas fa-pikachu text-3xl text-blue-500"></i>
                    </div>
                </div>
                <div class="grid-item" id="card-3">
                    <div class="card" id="card-3" onclick="selectCard(this)">
                        <i class="fas fa-pikachu text-3xl text-blue-500"></i>
                    </div>
                </div>
                <div class="grid-item" id="card-4">
                    <div class="card" id="card-4" onclick="selectCard(this)">
                        <i class="fas fa-pikachu text-3xl text-blue-500"></i>
                    </div>
                </div>
                <div class="grid-item" id="card-5">
                    <div class="card" id="card-5" onclick="selectCard(this)">
                        <i class="fas fa-pikachu text-3xl text-blue-500"></i>
                    </div>
                </div>
                <div class="grid-item" id="card-6">
                    <div class="card" id="card-6" onclick="selectCard(this)">
                        <i class="fas fa-pikachu text-3xl text-blue-500"></i>
                    </div>
                </div>
                <div class="grid-item" id="card-7">
                    <div class="card" id="card-7" onclick="selectCard(this)">
                        <i class="fas fa-pikachu text-3xl text-blue-500"></i>
                    </div>
                </div>
                <div class="grid-item" id="card-8">
                    <div class="card" id="card-8" onclick="selectCard(this)">
                        <i class="fas fa-pikachu text-3xl text-blue-500"></i>
                    </div>
                </div>
                <div class="grid-item" id="card-9">
                    <div class="card" id="card-9" onclick="selectCard(this)">
                        <i class="fas fa-pikachu text-3xl text-blue-500"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'click') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'match') {
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
                oscillator.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'mismatch') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'win') {
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                oscillator.frequency.setValueAtTime(400, audioCtx.currentTime + 0.1);
                oscillator.frequency.setValueAtTime(500, audioCtx.currentTime + 0.2);
                oscillator.frequency.setValueAtTime(600, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.5);
            }
        }

        let selectedCards = [];
        let score = 0;

        function selectCard(card) {
            if (card.classList.contains('active')) {
                return;
            }
            playSound('click');
            card.classList.add('active');
            selectedCards.push(card);
            if (selectedCards.length === 2) {
                setTimeout(() => {
                    let card1 = selectedCards[0];
                    let card2 = selectedCards[1];
                    if (card1.id === card2.id) {
                        playSound('match');
                        card1.style.display = 'none';
                        card2.style.display = 'none';
                        score++;
                        selectedCards = [];
                    } else {
                        playSound('mismatch');
                        card1.classList.remove('active');
                        card2.classList.remove('active');
                        selectedCards = [];
                    }
                }, 1000);
            }
        }

        function checkWin() {
            let visibleCards = Array.from(document.querySelectorAll('.card')).filter(c => c.style.display !== 'none');
            if (visibleCards.length === 0 && document.querySelector('.confetti').style.display !== 'block') {
                playSound('win');

                let toast = document.getElementById('toast');
                toast.classList.remove('hidden');
                setTimeout(() => { toast.classList.remove('opacity-0'); toast.classList.add('opacity-100'); }, 10);

                document.querySelector('.confetti').style.display = 'block';
                setTimeout(() => {
                    document.querySelector('.confetti').style.display = 'none';
                    toast.classList.remove('opacity-100');
                    toast.classList.add('opacity-0');
                    setTimeout(() => toast.classList.add('hidden'), 300);
                }, 3000);
            }
        }

        setInterval(() => {
            checkWin();
        }, 100);

        document.querySelector('.confetti').style.backgroundImage = 'linear-gradient(to bottom, #f7f7f7, #f7f7f7)';
        document.querySelector('.confetti').style.backgroundSize = '100% 100px';
        document.querySelector('.confetti').style.backgroundRepeat = 'no-repeat';
        document.querySelector('.confetti').style.backgroundPosition = '0% 0%';
        document.querySelector('.confetti').style.transition = 'background-position 10s linear';
        setInterval(() => {
            let angle = Math.random() * Math.PI * 2;
            let x = Math.random() * 100;
            let y = Math.random() * 100;
            let particle = document.createElement('div');
            particle.style.position = 'absolute';
            particle.style.top = `${y}%`;
            particle.style.left = `${x}%`;
            particle.style.background = `linear-gradient(to bottom, #f7f7f7, #f7f7f7)`;
            particle.style.backgroundSize = '100% 100px';
            particle.style.backgroundRepeat = 'no-repeat';
            particle.style.backgroundPosition = '0% 0%';
            particle.style.width = '10px';
            particle.style.height = '10px';
            particle.style.borderRadius = '50%';
            particle.style.transition = 'top 2s linear, left 2s linear';
            particle.style.transform = `rotate(${angle}rad)`;
            document.querySelector('.confetti').appendChild(particle);
            setTimeout(() => {
                particle.style.display = 'none';
            }, 2000);
        }, 100);
    </script>
</body>
</html>
