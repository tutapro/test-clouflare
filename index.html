<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rắn Săn Mồi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            margin: 0;
            overflow: hidden;
            touch-action: none; /* Prevent default touch actions like scroll */
            user-select: none;
            -webkit-user-select: none;
        }
        #game-container {
            position: relative;
        }
        #game-board {
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: block;
        }
        .btn {
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center text-white">

    <div class="mb-4 text-center w-full max-w-md px-4 flex justify-between items-end">
        <div>
            <h1 class="text-3xl font-extrabold tracking-wide drop-shadow-md">Rắn Săn Mồi</h1>
        </div>
        <div class="text-right">
            <div class="text-lg font-semibold bg-white bg-opacity-20 px-3 py-1 rounded-lg shadow-sm backdrop-blur-sm mb-2">
                Điểm: <span id="score" class="font-bold text-yellow-300">0</span>
            </div>
            <div class="text-sm font-medium bg-white bg-opacity-20 px-3 py-1 rounded-lg shadow-sm backdrop-blur-sm">
                Điểm Cao: <span id="high-score" class="font-bold text-yellow-300">0</span>
            </div>
        </div>
    </div>

    <div id="game-container">
        <canvas id="game-board" width="400" height="400"></canvas>

        <!-- Game Over Overlay -->
        <div id="game-over" class="absolute inset-0 bg-black bg-opacity-70 flex flex-col items-center justify-center rounded-lg hidden backdrop-blur-sm transition-opacity duration-300 z-10">
            <h2 class="text-3xl font-extrabold text-red-500 mb-2 drop-shadow-lg text-center px-2">Trò Chơi Kết Thúc!</h2>
            <p class="text-lg mb-6">Điểm của bạn: <span id="final-score" class="font-bold text-yellow-300">0</span></p>
            <button id="restart-btn" class="btn bg-gradient-to-r from-green-400 to-blue-500 hover:from-green-500 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-full shadow-lg text-lg uppercase tracking-wider">
                Chơi Lại
            </button>
        </div>
    </div>

    <!-- Mobile controls hint -->
    <p class="mt-6 text-sm text-gray-300 opacity-80 text-center max-w-xs">
        Sử dụng phím mũi tên hoặc vuốt màn hình để di chuyển.
    </p>

    <script>
        const canvas = document.getElementById('game-board');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('high-score');
        const finalScoreElement = document.getElementById('final-score');
        const gameOverScreen = document.getElementById('game-over');
        const restartBtn = document.getElementById('restart-btn');

        // Responsive canvas
        const gridSize = 20;
        let tileCountX = 20;
        let tileCountY = 20;

        function resizeCanvas() {
            const containerWidth = Math.min(window.innerWidth - 32, 400); // 16px padding each side
            const containerHeight = Math.min(window.innerHeight - 200, 400); // Room for header/footer
            const maxSize = Math.min(containerWidth, containerHeight);

            // Make sure dimensions are multiples of gridSize
            const newSize = Math.floor(maxSize / gridSize) * gridSize;

            // Only resize if needed to prevent resetting game randomly
            if (canvas.width !== newSize || canvas.height !== newSize) {
                canvas.width = newSize;
                canvas.height = newSize;
                tileCountX = canvas.width / gridSize;
                tileCountY = canvas.height / gridSize;

                // Keep apple inbound after resize
                if (appleX >= tileCountX) appleX = tileCountX - 1;
                if (appleY >= tileCountY) appleY = tileCountY - 1;
            }
        }

        window.addEventListener('resize', resizeCanvas);

        let snake = [];
        let snakeLength = 3;
        let headX = 10;
        let headY = 10;

        let velocityX = 0;
        let velocityY = 0;
        let nextVelocityX = 0;
        let nextVelocityY = 0;

        let appleX = 5;
        let appleY = 5;

        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        highScoreElement.textContent = highScore;

        let gameLoopTimeout;
        let isGameOver = false;
        let gameStarted = false;

        class SnakePart {
            constructor(x, y) {
                this.x = x;
                this.y = y;
            }
        }

        // Touch variables
        let touchStartX = 0;
        let touchStartY = 0;

        function initGame() {
            resizeCanvas(); // Ensure size is correct

            snake = [];
            snakeLength = 3;
            headX = Math.floor(tileCountX / 2);
            headY = Math.floor(tileCountY / 2);
            velocityX = 0;
            velocityY = 0;
            nextVelocityX = 0;
            nextVelocityY = 0;
            score = 0;
            scoreElement.textContent = score;
            isGameOver = false;
            gameStarted = false;
            gameOverScreen.classList.add('hidden');

            placeApple();
            drawGame();
        }

        function drawGame() {
            if (isGameOver) return;

            if (gameStarted) {
                // Apply queued velocity
                velocityX = nextVelocityX;
                velocityY = nextVelocityY;

                changeSnakePosition();
                let result = checkGameOver();

                clearScreen();
                drawApple();
                drawSnake();

                if (result) {
                    return;
                }
                checkAppleCollision();
            } else {
                clearScreen();
                drawApple();
                drawSnake();
            }

            gameLoopTimeout = setTimeout(drawGame, 1000 / 10); // 10 FPS
        }

        function clearScreen() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function drawRoundedRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            ctx.fill();
        }

        function drawSnake() {
            // Draw body
            ctx.fillStyle = '#22c55e'; // Green-500
            for (let i = 0; i < snake.length; i++) {
                let part = snake[i];
                drawRoundedRect(ctx, part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2, 4);
            }

            if (gameStarted || snake.length === 0) {
                snake.push(new SnakePart(headX, headY));
                while (snake.length > snakeLength) {
                    snake.shift();
                }
            }

            // Draw head
            ctx.fillStyle = '#4ade80'; // Green-400
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#4ade80';
            drawRoundedRect(ctx, headX * gridSize + 1, headY * gridSize + 1, gridSize - 2, gridSize - 2, 4);
            ctx.shadowBlur = 0; // Reset shadow for other drawings
        }

        function changeSnakePosition() {
            headX = headX + velocityX;
            headY = headY + velocityY;
        }

        function drawApple() {
            ctx.fillStyle = '#ef4444'; // Red-500
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ef4444';
            ctx.beginPath();
            ctx.arc(appleX * gridSize + gridSize / 2, appleY * gridSize + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function checkAppleCollision() {
            if (appleX === headX && appleY === headY) {
                placeApple();
                snakeLength++;
                score += 10;
                scoreElement.textContent = score;

                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
            }
        }

        function placeApple() {
            let valid = false;
            while (!valid) {
                appleX = Math.floor(Math.random() * tileCountX);
                appleY = Math.floor(Math.random() * tileCountY);
                valid = true;

                if(appleX === headX && appleY === headY) valid = false;

                for (let i = 0; i < snake.length; i++) {
                    if (appleX === snake[i].x && appleY === snake[i].y) {
                        valid = false;
                        break;
                    }
                }
            }
        }

        function checkGameOver() {
            let gameOver = false;

            if (velocityX === 0 && velocityY === 0) return false;

            // Walls
            if (headX < 0 || headX >= tileCountX || headY < 0 || headY >= tileCountY) {
                gameOver = true;
            }

            // Self collision
            for (let i = 0; i < snake.length; i++) {
                let part = snake[i];
                if (part.x === headX && part.y === headY) {
                    gameOver = true;
                    break;
                }
            }

            if (gameOver) {
                isGameOver = true;
                finalScoreElement.textContent = score;
                gameOverScreen.classList.remove('hidden');
            }

            return gameOver;
        }

        // Input Handlers
        document.body.addEventListener('keydown', keyDown);

        function keyDown(event) {
            // Prevent default scrolling for arrow keys
            if([37, 38, 39, 40].includes(event.keyCode)) {
                event.preventDefault();
            }

            if(!gameStarted && !isGameOver && [37,38,39,40,65,87,68,83].includes(event.keyCode)) {
                gameStarted = true;
            }

            // Up
            if ((event.keyCode == 38 || event.keyCode == 87) && velocityY != 1) {
                nextVelocityY = -1;
                nextVelocityX = 0;
            }
            // Down
            else if ((event.keyCode == 40 || event.keyCode == 83) && velocityY != -1) {
                nextVelocityY = 1;
                nextVelocityX = 0;
            }
            // Left
            else if ((event.keyCode == 37 || event.keyCode == 65) && velocityX != 1) {
                nextVelocityY = 0;
                nextVelocityX = -1;
            }
            // Right
            else if ((event.keyCode == 39 || event.keyCode == 68) && velocityX != -1) {
                nextVelocityY = 0;
                nextVelocityX = 1;
            }
        }

        // Touch handlers for mobile
        const gameContainer = document.getElementById('game-container');
        gameContainer.addEventListener('touchstart', handleTouchStart, {passive: false});
        gameContainer.addEventListener('touchmove', handleTouchMove, {passive: false});

        function handleTouchStart(evt) {
            const firstTouch = evt.touches[0];
            touchStartX = firstTouch.clientX;
            touchStartY = firstTouch.clientY;
            evt.preventDefault();
        }

        function handleTouchMove(evt) {
            if (!touchStartX || !touchStartY) {
                return;
            }

            let touchEndX = evt.touches[0].clientX;
            let touchEndY = evt.touches[0].clientY;

            let xDiff = touchStartX - touchEndX;
            let yDiff = touchStartY - touchEndY;

            if(!gameStarted && !isGameOver && (Math.abs(xDiff) > 5 || Math.abs(yDiff) > 5)) {
                gameStarted = true;
            }

            if (Math.abs(xDiff) > Math.abs(yDiff)) {
                // Horizontal
                if (xDiff > 0 && velocityX != 1) {
                    nextVelocityX = -1;
                    nextVelocityY = 0;
                } else if(xDiff < 0 && velocityX != -1) {
                    nextVelocityX = 1;
                    nextVelocityY = 0;
                }
            } else {
                // Vertical
                if (yDiff > 0 && velocityY != 1) {
                    nextVelocityY = -1;
                    nextVelocityX = 0;
                } else if(yDiff < 0 && velocityY != -1) {
                    nextVelocityY = 1;
                    nextVelocityX = 0;
                }
            }

            touchStartX = 0;
            touchStartY = 0;

            evt.preventDefault();
        }

        restartBtn.addEventListener('click', () => {
            clearTimeout(gameLoopTimeout);
            initGame();
        });

        // Ensure proper loading
        window.onload = initGame;

    </script>
</body>
</html>
