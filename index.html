<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Rắn Săn Mồi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .game-container {
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        canvas {
            background-color: #111;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="game-container w-full max-w-lg mx-auto">
        <h1 class="text-3xl font-bold mb-4 text-gray-800">Rắn Săn Mồi</h1>
        <div class="flex justify-between items-center mb-4">
            <span class="text-xl font-semibold text-gray-700">Điểm: <span id="score" class="text-blue-600">0</span></span>
            <span class="text-xl font-semibold text-gray-700">Kỷ lục: <span id="high-score" class="text-red-600">0</span></span>
        </div>
        <canvas id="gameCanvas" width="400" height="400" class="mx-auto block"></canvas>
        <div class="mt-6 flex gap-4 justify-center">
            <button id="startBtn" class="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 font-semibold transition shadow-md">Bắt đầu</button>
            <button id="resetBtn" class="px-6 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 font-semibold transition shadow-md">Chơi lại</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("high-score");
        const startBtn = document.getElementById("startBtn");
        const resetBtn = document.getElementById("resetBtn");

        const box = 20;
        let snake = [];
        let food = {};
        let d;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop;
        let isPlaying = false;

        highScoreElement.innerText = highScore;

        function initGame() {
            snake = [];
            snake[0] = { x: 9 * box, y: 10 * box };
            score = 0;
            d = null;
            scoreElement.innerText = score;
            spawnFood();
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * 20) * box,
                y: Math.floor(Math.random() * 20) * box
            };
            // Ensure food doesn't spawn on snake
            for (let i = 0; i < snake.length; i++) {
                if (food.x === snake[i].x && food.y === snake[i].y) {
                    spawnFood();
                    break;
                }
            }
        }

        document.addEventListener("keydown", direction);

        function direction(event) {
            let key = event.keyCode;
            if (key == 37 && d != "RIGHT") {
                d = "LEFT";
                event.preventDefault();
            } else if (key == 38 && d != "DOWN") {
                d = "UP";
                event.preventDefault();
            } else if (key == 39 && d != "LEFT") {
                d = "RIGHT";
                event.preventDefault();
            } else if (key == 40 && d != "UP") {
                d = "DOWN";
                event.preventDefault();
            }
        }

        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) {
                    return true;
                }
            }
            return false;
        }

        function draw() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#4ade80" : "#22c55e"; // Lighter green for head
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "#000";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = "#ef4444"; // Red for food
            ctx.fillRect(food.x, food.y, box, box);

            if (!d) return; // Don't move until key pressed

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            if (snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerText = score;
                spawnFood();
            } else {
                snake.pop();
            }

            let newHead = {
                x: snakeX,
                y: snakeY
            };

            if (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(gameLoop);
                isPlaying = false;
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2);

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                    highScoreElement.innerText = highScore;
                }

                startBtn.disabled = false;
                startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                return;
            }

            snake.unshift(newHead);
        }

        function startGame() {
            if (isPlaying) return;
            initGame();
            isPlaying = true;
            startBtn.disabled = true;
            startBtn.classList.add('opacity-50', 'cursor-not-allowed');
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(draw, 100);
        }

        startBtn.addEventListener("click", startGame);

        resetBtn.addEventListener("click", () => {
            if (gameLoop) clearInterval(gameLoop);
            isPlaying = false;
            startBtn.disabled = false;
            startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            initGame();
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#4ade80";
            ctx.fillRect(snake[0].x, snake[0].y, box, box);
            ctx.strokeStyle = "#000";
            ctx.strokeRect(snake[0].x, snake[0].y, box, box);

            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.textAlign = "center";
            ctx.fillText("Nhấn Bắt đầu để chơi", canvas.width / 2, canvas.height / 2 + 50);
        });

        // Initial draw
        initGame();
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#4ade80";
        ctx.fillRect(snake[0].x, snake[0].y, box, box);
        ctx.strokeStyle = "#000";
        ctx.strokeRect(snake[0].x, snake[0].y, box, box);

        ctx.fillStyle = "white";
        ctx.font = "20px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Nhấn Bắt đầu để chơi", canvas.width / 2, canvas.height / 2 + 50);

    </script>
</body>
</html>
