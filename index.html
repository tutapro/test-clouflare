<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Máy Tính Khoa Học</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        @layer components {
            .btn-calc {
                @apply bg-white/10 text-white text-lg font-medium py-4 px-2 rounded-2xl backdrop-blur-md border border-white/20 transition-all duration-200 active:scale-90 active:bg-white/30 shadow-[0_4px_30px_rgba(0,0,0,0.1)] hover:bg-white/20 flex items-center justify-center select-none touch-manipulation cursor-pointer;
            }
            .btn-num {
                @apply text-2xl font-semibold bg-white/20 hover:bg-white/30 active:bg-white/40;
            }
            .btn-op {
                @apply bg-indigo-500/70 hover:bg-indigo-500/90 text-white font-bold text-2xl;
            }
            .btn-func {
                @apply text-sm md:text-base;
            }
            .btn-del {
                @apply bg-rose-500/70 hover:bg-rose-500/90 text-white font-bold;
            }
            .btn-eq {
                @apply bg-emerald-500/80 hover:bg-emerald-500/90 text-white font-bold text-3xl shadow-[0_0_15px_rgba(16,185,129,0.5)];
            }
        }

        #display::-webkit-scrollbar {
            display: none;
        }
        #display {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-slate-900 min-h-screen flex items-center justify-center p-4 antialiased selection:bg-purple-500/30">

    <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-6 rounded-[2rem] shadow-[0_8px_32px_0_rgba(0,0,0,0.3)] w-full max-w-sm flex flex-col">
        <h1 class="text-white/80 text-xl font-medium mb-5 text-center tracking-wider uppercase text-sm">Máy Tính Khoa Học</h1>

        <div class="relative w-full mb-6">
            <div id="history" class="text-white/50 text-right text-sm h-6 overflow-hidden w-full px-2 mb-1"></div>
            <input type="text" id="display" readonly class="w-full bg-black/20 border border-white/10 rounded-2xl text-right text-white text-5xl p-4 shadow-inner focus:outline-none placeholder-white/30 overflow-x-auto" placeholder="0">
        </div>

        <div class="grid grid-cols-4 gap-3 md:gap-4">
            <!-- Row 1: Scientific -->
            <button onclick="appendValue('sin(')" class="btn-calc btn-func">sin</button>
            <button onclick="appendValue('cos(')" class="btn-calc btn-func">cos</button>
            <button onclick="appendValue('tan(')" class="btn-calc btn-func">tan</button>
            <button onclick="appendValue('log(')" class="btn-calc btn-func">log</button>

            <!-- Row 2: Advanced -->
            <button onclick="appendValue('sqrt(')" class="btn-calc btn-func">sqrt</button>
            <button onclick="appendValue('^')" class="btn-calc btn-func">^</button>
            <button onclick="appendValue('(')" class="btn-calc btn-func">(</button>
            <button onclick="appendValue(')')" class="btn-calc btn-func">)</button>

            <!-- Row 3: Control -->
            <button onclick="clearAll()" class="btn-calc btn-del col-span-2">Xóa hết</button>
            <button onclick="deleteLast()" class="btn-calc btn-del bg-orange-500/70 hover:bg-orange-500/90">Xóa</button>
            <button onclick="appendValue('÷')" class="btn-calc btn-op">÷</button>

            <!-- Row 4: Numbers -->
            <button onclick="appendValue('7')" class="btn-calc btn-num">7</button>
            <button onclick="appendValue('8')" class="btn-calc btn-num">8</button>
            <button onclick="appendValue('9')" class="btn-calc btn-num">9</button>
            <button onclick="appendValue('×')" class="btn-calc btn-op">×</button>

            <!-- Row 5: Numbers -->
            <button onclick="appendValue('4')" class="btn-calc btn-num">4</button>
            <button onclick="appendValue('5')" class="btn-calc btn-num">5</button>
            <button onclick="appendValue('6')" class="btn-calc btn-num">6</button>
            <button onclick="appendValue('-')" class="btn-calc btn-op">-</button>

            <!-- Row 6: Numbers -->
            <button onclick="appendValue('1')" class="btn-calc btn-num">1</button>
            <button onclick="appendValue('2')" class="btn-calc btn-num">2</button>
            <button onclick="appendValue('3')" class="btn-calc btn-num">3</button>
            <button onclick="appendValue('+')" class="btn-calc btn-op">+</button>

            <!-- Row 7: Bottom -->
            <button onclick="appendValue('0')" class="btn-calc btn-num col-span-2">0</button>
            <button onclick="appendValue('.')" class="btn-calc btn-num">.</button>
            <button onclick="calculate()" class="btn-calc btn-eq">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const history = document.getElementById('history');
        let currentExpression = "";
        let isError = false;

        function updateDisplay() {
            display.value = currentExpression;
            // Scroll to end
            display.scrollLeft = display.scrollWidth;
        }

        function appendValue(value) {
            if (isError) {
                currentExpression = "";
                isError = false;
            }
            currentExpression += value;
            updateDisplay();
        }

        function clearAll() {
            currentExpression = "";
            history.innerText = "";
            isError = false;
            updateDisplay();
        }

        function deleteLast() {
            if (isError) {
                clearAll();
                return;
            }
            currentExpression = currentExpression.toString().slice(0, -1);
            updateDisplay();
        }

        function calculate() {
            if (!currentExpression) return;

            try {
                history.innerText = currentExpression + ' =';

                let evalExpr = currentExpression
                    .replace(/sin\(/g, 'Math.sin(')
                    .replace(/cos\(/g, 'Math.cos(')
                    .replace(/tan\(/g, 'Math.tan(')
                    .replace(/log\(/g, 'Math.log10(')
                    .replace(/sqrt\(/g, 'Math.sqrt(')
                    .replace(/\^/g, '**')
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/');

                // Use Function instead of eval for slightly better safety/scope
                let result = Function('"use strict"; return (' + evalExpr + ')')();

                if (result === undefined || Number.isNaN(result) || !isFinite(result)) {
                    throw new Error("Invalid");
                }

                // Fix floating point precision issues (e.g. 0.1 + 0.2)
                result = Math.round(result * 1e12) / 1e12;

                currentExpression = result.toString();
                isError = false;
            } catch (e) {
                currentExpression = "Lỗi";
                isError = true;
            }
            updateDisplay();
        }

        // Add keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9' || e.key === '.') {
                appendValue(e.key);
            } else if (e.key === '+' || e.key === '-' || e.key === '^' || e.key === '(' || e.key === ')') {
                appendValue(e.key);
            } else if (e.key === '*') {
                appendValue('×');
            } else if (e.key === '/') {
                appendValue('÷');
                e.preventDefault();
            } else if (e.key === 'Enter' || e.key === '=') {
                calculate();
                e.preventDefault();
            } else if (e.key === 'Backspace') {
                deleteLast();
            } else if (e.key === 'Escape') {
                clearAll();
            }
        });
    </script>
</body>
</html>
