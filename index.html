<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikachu Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tile-bg {
            background-color: #f3f4f6;
            border: 2px solid #e5e7eb;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tile-bg:hover {
            background-color: #e5e7eb;
        }
        .selected {
            background-color: #fef08a;
            border-color: #eab308;
            transform: scale(1.05);
        }
        .empty {
            visibility: hidden;
        }
        #game-board {
            position: relative;
            display: inline-block;
        }
        #lines-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .game-container {
            overflow: auto;
            max-width: 100%;
        }
    </style>
</head>
<body class="bg-blue-50 font-sans text-gray-900 min-h-screen flex flex-col">
    <div class="max-w-7xl mx-auto p-4 w-full flex-grow flex flex-col">
        <div class="bg-white rounded-xl shadow-lg p-6 mb-4 flex-grow flex flex-col items-center">
            <h1 class="text-4xl font-extrabold text-yellow-500 mb-2 drop-shadow-sm tracking-wide">Pikachu Connect</h1>

            <div class="flex flex-wrap justify-between w-full max-w-3xl mb-4 text-xl font-semibold text-gray-700">
                <div class="bg-gray-100 px-4 py-2 rounded-lg">Score: <span id="score" class="text-blue-600">0</span></div>
                <div class="bg-gray-100 px-4 py-2 rounded-lg">Pairs Left: <span id="pairs-left" class="text-blue-600">0</span></div>
                <button id="restart-btn" class="bg-yellow-400 hover:bg-yellow-500 text-white font-bold py-2 px-6 rounded-lg transition-colors shadow-md">New Game</button>
            </div>

            <div class="game-container flex justify-center items-center w-full">
                <div id="game-board">
                    <svg id="lines-svg"></svg>
                    <div id="grid" class="grid gap-1 p-4 bg-gray-300 rounded-lg shadow-inner relative">
                        <!-- Grid generated by JS -->
                    </div>
                </div>
            </div>

            <div id="game-over-panel" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                <div class="bg-white rounded-2xl shadow-2xl p-8 text-center max-w-md mx-4">
                    <h2 class="text-4xl font-bold text-green-500 mb-4" id="game-over-title">You Win!</h2>
                    <p class="text-xl mb-6">Final Score: <span id="final-score" class="font-bold text-blue-600">0</span></p>
                    <button id="play-again-btn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-8 rounded-full transition-colors text-lg shadow-lg">Play Again</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ROWS = 8;
        const COLS = 14;
        const POKEMON_COUNT = 30;

        let board = [];
        let selectedTile = null;
        let score = 0;
        let pairsLeft = 0;
        let isDrawingLine = false;

        const gridElement = document.getElementById('grid');
        const svgElement = document.getElementById('lines-svg');
        const scoreElement = document.getElementById('score');
        const pairsLeftElement = document.getElementById('pairs-left');
        const gameOverPanel = document.getElementById('game-over-panel');
        const finalScoreElement = document.getElementById('final-score');
        const gameOverTitle = document.getElementById('game-over-title');

        gridElement.style.gridTemplateColumns = `repeat(${COLS + 2}, minmax(0, 1fr))`;

        function initGame() {
            score = 0;
            selectedTile = null;
            isDrawingLine = false;
            gameOverPanel.classList.add('hidden');
            updateUI();
            svgElement.innerHTML = '';

            board = Array(ROWS + 2).fill(null).map(() => Array(COLS + 2).fill(0));

            let tiles = [];
            let totalTiles = ROWS * COLS;
            pairsLeft = totalTiles / 2;

            for (let i = 0; i < totalTiles; i += 2) {
                let pokemonId = Math.floor(Math.random() * POKEMON_COUNT) + 1;
                tiles.push(pokemonId);
                tiles.push(pokemonId);
            }

            for (let i = tiles.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
            }

            let tileIndex = 0;
            for (let r = 1; r <= ROWS; r++) {
                for (let c = 1; c <= COLS; c++) {
                    board[r][c] = tiles[tileIndex++];
                }
            }

            renderBoard();
        }

        function renderBoard() {
            gridElement.innerHTML = '';
            for (let r = 0; r < ROWS + 2; r++) {
                for (let c = 0; c < COLS + 2; c++) {
                    const cell = document.createElement('div');
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    cell.className = 'w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center rounded';

                    if (r === 0 || r === ROWS + 1 || c === 0 || c === COLS + 1) {
                        cell.classList.add('empty-pad');
                    } else if (board[r][c] > 0) {
                        cell.classList.add('tile-bg', 'shadow-sm');
                        cell.innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${board[r][c]}.png" class="w-full h-full object-contain pointer-events-none" />`;
                        cell.onclick = () => handleTileClick(r, c);
                    } else {
                        cell.classList.add('empty');
                    }

                    gridElement.appendChild(cell);
                }
            }
        }

        function handleTileClick(r, c) {
            if (isDrawingLine || board[r][c] === 0) return;

            if (selectedTile) {
                if (selectedTile.r === r && selectedTile.c === c) {
                    updateTileSelection(selectedTile.r, selectedTile.c, false);
                    selectedTile = null;
                } else if (board[selectedTile.r][selectedTile.c] === board[r][c]) {
                    let path = findPath(selectedTile, {r, c});
                    if (path) {
                        handleMatch(selectedTile, {r, c}, path);
                    } else {
                        updateTileSelection(selectedTile.r, selectedTile.c, false);
                        selectedTile = {r, c};
                        updateTileSelection(r, c, true);
                    }
                } else {
                    updateTileSelection(selectedTile.r, selectedTile.c, false);
                    selectedTile = {r, c};
                    updateTileSelection(r, c, true);
                }
            } else {
                selectedTile = {r, c};
                updateTileSelection(r, c, true);
            }
        }

        function updateTileSelection(r, c, isSelected) {
            const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
            if (cell) {
                if (isSelected) {
                    cell.classList.add('selected');
                } else {
                    cell.classList.remove('selected');
                }
            }
        }

        function handleMatch(tile1, tile2, path) {
            isDrawingLine = true;
            board[tile1.r][tile1.c] = 0;
            board[tile2.r][tile2.c] = 0;

            drawPath(path);

            score += 10;
            pairsLeft--;
            updateUI();

            setTimeout(() => {
                svgElement.innerHTML = '';
                renderBoard();
                selectedTile = null;
                isDrawingLine = false;

                if (pairsLeft === 0) {
                    gameOver(true);
                } else if (!hasPossibleMoves()) {
                    shuffleBoard();
                }
            }, 400);
        }

        function drawPath(path) {
            svgElement.innerHTML = '';
            if (path.length < 2) return;

            let d = '';
            for (let i = 0; i < path.length; i++) {
                const p = path[i];
                const cell = document.querySelector(`[data-r="${p.r}"][data-c="${p.c}"]`);
                if (!cell) continue;

                const rect = cell.getBoundingClientRect();
                const boardRect = gridElement.getBoundingClientRect();

                const x = rect.left - boardRect.left + rect.width / 2;
                const y = rect.top - boardRect.top + rect.height / 2;

                if (i === 0) {
                    d += `M ${x} ${y} `;
                } else {
                    d += `L ${x} ${y} `;
                }
            }

            const pathEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
            pathEl.setAttribute("d", d);
            pathEl.setAttribute("stroke", "#ef4444");
            pathEl.setAttribute("stroke-width", "6");
            pathEl.setAttribute("fill", "none");
            pathEl.setAttribute("stroke-linejoin", "round");
            pathEl.setAttribute("stroke-linecap", "round");

            svgElement.appendChild(pathEl);
        }

        function updateUI() {
            scoreElement.textContent = score;
            pairsLeftElement.textContent = pairsLeft;
        }

        function gameOver(win) {
            gameOverPanel.classList.remove('hidden');
            gameOverTitle.textContent = win ? "You Win!" : "No More Moves!";
            gameOverTitle.className = win ? "text-4xl font-bold text-green-500 mb-4" : "text-4xl font-bold text-red-500 mb-4";
            finalScoreElement.textContent = score;
        }

        function findPath(start, end) {
            const queue = [{
                r: start.r,
                c: start.c,
                path: [{r: start.r, c: start.c}],
                dir: -1,
                turns: 0
            }];

            const visited = Array(ROWS + 2).fill(null).map(() => Array(COLS + 2).fill(null).map(() => [4, 4, 4, 4]));

            const dr = [-1, 0, 1, 0];
            const dc = [0, 1, 0, -1];

            visited[start.r][start.c] = [0, 0, 0, 0];

            let minTurnsPath = null;

            while (queue.length > 0) {
                const curr = queue.shift();

                if (curr.r === end.r && curr.c === end.c) {
                    if (!minTurnsPath || curr.turns < minTurnsPath.turns) {
                        minTurnsPath = curr;
                    }
                    continue;
                }

                for (let i = 0; i < 4; i++) {
                    const nr = curr.r + dr[i];
                    const nc = curr.c + dc[i];

                    if (nr >= 0 && nr < ROWS + 2 && nc >= 0 && nc < COLS + 2) {
                        if (board[nr][nc] === 0 || (nr === end.r && nc === end.c)) {
                            let newTurns = curr.turns;
                            if (curr.dir !== -1 && curr.dir !== i) {
                                newTurns++;
                            }

                            if (newTurns <= 2 && newTurns < visited[nr][nc][i]) {
                                visited[nr][nc][i] = newTurns;
                                queue.push({
                                    r: nr,
                                    c: nc,
                                    path: [...curr.path, {r: nr, c: nc}],
                                    dir: i,
                                    turns: newTurns
                                });
                            }
                        }
                    }
                }
            }
            return minTurnsPath ? minTurnsPath.path : null;
        }

        function hasPossibleMoves() {
            let tiles = [];
            for (let r = 1; r <= ROWS; r++) {
                for (let c = 1; c <= COLS; c++) {
                    if (board[r][c] > 0) {
                        tiles.push({r, c, id: board[r][c]});
                    }
                }
            }

            for (let i = 0; i < tiles.length; i++) {
                for (let j = i + 1; j < tiles.length; j++) {
                    if (tiles[i].id === tiles[j].id) {
                        if (findPath(tiles[i], tiles[j])) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        function shuffleBoard() {
            let remainingIds = [];
            for (let r = 1; r <= ROWS; r++) {
                for (let c = 1; c <= COLS; c++) {
                    if (board[r][c] > 0) {
                        remainingIds.push(board[r][c]);
                    }
                }
            }

            if (remainingIds.length === 0) return;

            for (let i = remainingIds.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [remainingIds[i], remainingIds[j]] = [remainingIds[j], remainingIds[i]];
            }

            let idx = 0;
            for (let r = 1; r <= ROWS; r++) {
                for (let c = 1; c <= COLS; c++) {
                    if (board[r][c] > 0) {
                        board[r][c] = remainingIds[idx++];
                    }
                }
            }
            renderBoard();

            if (!hasPossibleMoves()) {
                setTimeout(shuffleBoard, 100);
            }
        }

        document.getElementById('restart-btn').addEventListener('click', initGame);
        document.getElementById('play-again-btn').addEventListener('click', initGame);

        window.addEventListener('load', initGame);
    </script>
</body>
</html>
