<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikachu Connect</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body class="bg-black text-white">
    <div class="flex justify-center items-center h-screen">
        <div class="bg-yellow-500 p-4 rounded-md shadow-md">
            <h1 class="text-3xl font-bold mb-4">Pikachu Connect</h1>
            <div class="flex justify-between items-center mb-4">
                <button class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2 px-4 rounded-md" id="easy-button">Dễ</button>
                <button class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2 px-4 rounded-md" id="medium-button">Trung bình</button>
                <button class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2 px-4 rounded-md" id="hard-button">Khó</button>
            </div>
            <canvas id="game-canvas" class="w-full h-screen"></canvas>
            <div class="flex justify-between items-center mt-4">
                <p class="text-lg font-bold">Điểm số: <span id="score">0</span></p>
                <p class="text-lg font-bold">Chế độ chơi: <span id="mode">Dễ</span></p>
            </div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const easyButton = document.getElementById('easy-button');
        const mediumButton = document.getElementById('medium-button');
        const hardButton = document.getElementById('hard-button');
        const scoreElement = document.getElementById('score');
        const modeElement = document.getElementById('mode');
        let score = 0;
        let mode = 'easy';
        let level = 5;
        let pikachu = [];
        let pairs = [];
        let selected = null;
        let dragging = false;

        easyButton.addEventListener('click', () => {
            mode = 'easy';
            level = 5;
            score = 0;
            modeElement.textContent = 'Dễ';
            scoreElement.textContent = '0';
            resetGame();
        });

        mediumButton.addEventListener('click', () => {
            mode = 'medium';
            level = 10;
            score = 0;
            modeElement.textContent = 'Trung bình';
            scoreElement.textContent = '0';
            resetGame();
        });

        hardButton.addEventListener('click', () => {
            mode = 'hard';
            level = 15;
            score = 0;
            modeElement.textContent = 'Khó';
            scoreElement.textContent = '0';
            resetGame();
        });

        function resetGame() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pikachu = [];
            pairs = [];
            selected = null;
            dragging = false;
            for (let i = 0; i < level; i++) {
                pikachu.push({
                    x: Math.random() * (canvas.width - 100),
                    y: Math.random() * (canvas.height - 100),
                    color: Math.random() < 0.5 ? 'yellow' : 'black',
                    pair: Math.floor(Math.random() * level),
                });
                pairs.push({
                    first: null,
                    second: null,
                });
            }
            ctx.font = '24px Outfit';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let i = 0; i < level; i++) {
                ctx.fillStyle = pikachu[i].color === 'yellow' ? 'yellow' : 'black';
                ctx.fillText('Pikachu', pikachu[i].x, pikachu[i].y);
            }
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            if (selected === null) {
                for (let i = 0; i < level; i++) {
                    if (ctx.isPointInPath(ctx.getImageData(pikachu[i].x, pikachu[i].y, 1, 1).data, pikachu[i].x, pikachu[i].y)) {
                        selected = i;
                        break;
                    }
                }
            } else {
                for (let i = 0; i < level; i++) {
                    if (ctx.isPointInPath(ctx.getImageData(pikachu[i].x, pikachu[i].y, 1, 1).data, pikachu[i].x, pikachu[i].y)) {
                        if (pikachu[i].pair === selected && pairs[selected].first === null) {
                            pairs[selected].first = i;
                            pairs[selected].second = null;
                            score += 1;
                            scoreElement.textContent = score;
                        } else if (pikachu[i].pair === selected && pairs[selected].second === null) {
                            pairs[selected].second = i;
                            pairs[selected].first = null;
                            score += 1;
                            scoreElement.textContent = score;
                        } else {
                            score -= 1;
                            scoreElement.textContent = score;
                        }
                        selected = null;
                        break;
                    }
                }
            }
            if (selected !== null) {
                ctx.fillStyle = pikachu[selected].color === 'yellow' ? 'yellow' : 'black';
                ctx.fillText('Pikachu', pikachu[selected].x, pikachu[selected].y);
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            if (selected !== null) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < level; i++) {
                    ctx.fillStyle = pikachu[i].color === 'yellow' ? 'yellow' : 'black';
                    ctx.fillText('Pikachu', pikachu[i].x, pikachu[i].y);
                }
                ctx.fillStyle = pikachu[selected].color === 'yellow' ? 'yellow' : 'black';
                ctx.fillText('Pikachu', x, y);
                dragging = true;
            }
        });

        canvas.addEventListener('mouseout', () => {
            if (dragging) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < level; i++) {
                    ctx.fillStyle = pikachu[i].color === 'yellow' ? 'yellow' : 'black';
                    ctx.fillText('Pikachu', pikachu[i].x, pikachu[i].y);
                }
                dragging = false;
            }
        });

        resetGame();
    </script>
</body>
</html>
