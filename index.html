<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikachu Connect</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <script src="https://kit.fontawesome.com/your-font-api-key.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons&display=swap" rel="stylesheet">
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 10px;
            padding: 20px;
        }
        
        .grid-item {
            background-color: #f0f0f0;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
        }
        
        .grid-item:hover {
            background-color: #ddd;
        }
        
        .grid-item.active {
            background-color: #ccc;
        }
        
        .grid-item.matched {
            background-color: #0f0;
            color: #fff;
        }
        
        .connection-line {
            position: absolute;
            width: 2px;
            height: 100%;
            background-color: #000;
        }
        
        .connection-line.vertical {
            transform: rotate(90deg);
        }
        
        .confetti {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }
        
        .confetti.show {
            display: block;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="grid-container mx-auto" id="grid-container">
        <!-- Grid items will be generated dynamically -->
    </div>
    <script>
        const gridContainer = document.getElementById('grid-container');
        const gridItems = [];
        const emojis = ['🐶', '🐱', '🐔', '🐷', '🐴', '🐲', '🐸', '🐹', '🐺', '🐻'];
        const gridSize = 4;
        const gridItemSize = 100;
        const gridGap = 10;
        const connectionLineColor = '#000';
        const matchedColor = '#0f0';
        const confettiColor = '#ff69b4';

        // Generate grid items
        for (let i = 0; i < gridSize * gridSize; i++) {
            const gridItem = document.createElement('div');
            gridItem.classList.add('grid-item');
            gridItem.dataset.index = i;
            gridItem.dataset.emoji = emojis[Math.floor(Math.random() * emojis.length)];
            gridItem.addEventListener('click', handleGridItemClick);
            gridContainer.appendChild(gridItem);
            gridItems.push(gridItem);
        }

        // Function to handle grid item click
        function handleGridItemClick(event) {
            const gridItem = event.target;
            const index = gridItem.dataset.index;
            const emoji = gridItem.dataset.emoji;
            const activeGridItems = gridItems.filter(item => item.classList.contains('active'));
            const activeGridItemIndex = activeGridItems[0].dataset.index;
            const activeGridItemEmoji = activeGridItems[0].dataset.emoji;

            // Check if the clicked grid item matches the active grid item
            if (emoji === activeGridItemEmoji) {
                gridItem.classList.add('active');
                activeGridItems[0].classList.add('matched');
                const connectionLine = document.createElement('div');
                connectionLine.classList.add('connection-line', 'vertical');
                connectionLine.style.top = `${gridItem.offsetTop}px`;
                connectionLine.style.left = `${gridItem.offsetLeft}px`;
                connectionLine.style.width = `${gridItem.offsetWidth}px`;
                connectionLine.style.height = `${gridItem.offsetHeight}px`;
                connectionLine.style.transform = `rotate(${Math.random() * 360}deg)`;
                gridContainer.appendChild(connectionLine);
                setTimeout(() => {
                    connectionLine.remove();
                    gridItem.classList.remove('active');
                    activeGridItems[0].classList.remove('matched');
                    gridItem.dataset.matched = 'true';
                    activeGridItems[0].dataset.matched = 'true';
                    checkForWin();
                }, 1000);
            }
        }

        // Function to check if the game has been won
        function checkForWin() {
            const matchedGridItems = gridItems.filter(item => item.dataset.matched === 'true');
            if (matchedGridItems.length === gridItems.length) {
                // Game won, show confetti
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.backgroundImage = `linear-gradient(to bottom, ${confettiColor} 0%, ${confettiColor} 50%, #fff 50%, #fff 100%)`;
                confetti.style.backgroundSize = '100% 100px';
                confetti.style.backgroundRepeat = 'no-repeat';
                confetti.style.backgroundPosition = 'bottom';
                gridContainer.appendChild(confetti);
                confetti.classList.add('show');
                setTimeout(() => {
                    confetti.remove();
                }, 2000);
            }
        }

        // Function to generate confetti
        function generateConfetti() {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.backgroundImage = `linear-gradient(to bottom, ${confettiColor} 0%, ${confettiColor} 50%, #fff 50%, #fff 100%)`;
            confetti.style.backgroundSize = '100% 100px';
            confetti.style.backgroundRepeat = 'no-repeat';
            confetti.style.backgroundPosition = 'bottom';
            confetti.style.width = '100px';
            confetti.style.height = '100px';
            confetti.style.top = `${Math.random() * (gridContainer.offsetHeight - 100)}px`;
            confetti.style.left = `${Math.random() * (gridContainer.offsetWidth - 100)}px`;
            confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
            confetti.style.opacity = '0.5';
            gridContainer.appendChild(confetti);
            setTimeout(() => {
                confetti.remove();
            }, 2000);
        }

        // Show confetti when the game is won
        checkForWin();
    </script>
</body>
</html>
